<svg width="1200" height="500" viewBox="0 0 1200 500" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <rect width="1200" height="500" rx="20" fill="#faf9f7"/>
  <text x="48" y="52" font-size="20" font-weight="700" fill="#1c1b17" letter-spacing="-0.4">Architecture</text>
  <text x="188" y="52" font-size="14" fill="#6f6b61">no hosted models, no telemetry — everything inside the dashed line is yours</text>

  <!-- self-host boundary -->
  <rect x="48" y="84" width="722" height="372" rx="16" fill="#ffffff" stroke="#2a7d5f" stroke-width="2" stroke-dasharray="7 6"/>
  <rect x="64" y="74" width="220" height="24" rx="12" fill="#e7f2ec"/>
  <text x="174" y="91" font-size="12.5" font-weight="700" fill="#2a7d5f" text-anchor="middle">YOUR INFRASTRUCTURE</text>

  <!-- web -->
  <g transform="translate(88,128)">
    <rect width="300" height="92" rx="12" fill="#faf9f7" stroke="#e7e4de" stroke-width="1.5"/>
    <text x="20" y="32" font-size="15" font-weight="700" fill="#1c1b17">apps/web</text>
    <text x="20" y="56" font-size="12.5" fill="#5b5850">Next.js 15 · React 19</text>
    <text x="20" y="76" font-size="12.5" fill="#5b5850">BlockNote editor · Cmd-K palette</text>
  </g>
  <!-- collab -->
  <g transform="translate(430,128)">
    <rect width="300" height="92" rx="12" fill="#faf9f7" stroke="#e7e4de" stroke-width="1.5"/>
    <text x="20" y="32" font-size="15" font-weight="700" fill="#1c1b17">apps/collab</text>
    <text x="20" y="56" font-size="12.5" fill="#5b5850">Hocuspocus · Yjs CRDT</text>
    <text x="20" y="76" font-size="12.5" fill="#5b5850">real-time multiplayer sync</text>
  </g>
  <!-- server -->
  <g transform="translate(88,250)">
    <rect width="300" height="100" rx="12" fill="#faf9f7" stroke="#e7e4de" stroke-width="1.5"/>
    <text x="20" y="32" font-size="15" font-weight="700" fill="#1c1b17">apps/server</text>
    <text x="20" y="56" font-size="12.5" fill="#5b5850">Hono API · Better Auth</text>
    <text x="20" y="78" font-size="12.5" fill="#5b5850">MCP bridge · Context Graph · routines</text>
  </g>
  <!-- postgres -->
  <g transform="translate(430,250)">
    <rect width="300" height="100" rx="12" fill="#faf9f7" stroke="#e7e4de" stroke-width="1.5"/>
    <text x="20" y="32" font-size="15" font-weight="700" fill="#1c1b17">PostgreSQL</text>
    <text x="20" y="56" font-size="12.5" fill="#5b5850">Drizzle ORM · embedded in dev</text>
    <text x="20" y="78" font-size="12.5" fill="#5b5850">specs, tasks, sign-offs, embeddings</text>
  </g>

  <!-- internal links -->
  <line x1="388" y1="174" x2="430" y2="174" stroke="#cfcabd" stroke-width="2"/>
  <line x1="238" y1="220" x2="238" y2="250" stroke="#cfcabd" stroke-width="2"/>
  <line x1="580" y1="220" x2="580" y2="250" stroke="#cfcabd" stroke-width="2"/>
  <line x1="388" y1="300" x2="430" y2="300" stroke="#cfcabd" stroke-width="2"/>

  <!-- packages note -->
  <text x="88" y="392" font-size="12" fill="#6f6b61">packages/core — shared Drizzle schema &amp; types · packages/cli — burrow sync / skill / agent</text>
  <text x="88" y="430" font-size="13" font-weight="600" fill="#2a7d5f">Turborepo · pnpm · TypeScript end-to-end · Docker optional</text>

  <!-- external edges -->
  <!-- BYO keys -->
  <path d="M770 175 h70" stroke="#2a7d5f" stroke-width="2" stroke-dasharray="5 4" fill="none" marker-end="url(#ar)"/>
  <g transform="translate(842,128)">
    <rect width="310" height="92" rx="12" fill="#e7f2ec" stroke="#cfe6da" stroke-width="1.5"/>
    <text x="20" y="32" font-size="15" font-weight="700" fill="#1c1b17">LLM providers</text>
    <text x="20" y="56" font-size="12.5" fill="#5b5850">Anthropic · OpenAI · Google · Ollama</text>
    <text x="20" y="76" font-size="12.5" font-weight="600" fill="#2a7d5f">your API keys — org brings its own</text>
  </g>
  <!-- MCP -->
  <path d="M770 300 h70" stroke="#175cd3" stroke-width="2" fill="none" marker-end="url(#arb)"/>
  <g transform="translate(842,250)">
    <rect width="310" height="100" rx="12" fill="#ffffff" stroke="#e7e4de" stroke-width="1.5"/>
    <text x="20" y="32" font-size="15" font-weight="700" fill="#1c1b17">Coding agents</text>
    <text x="20" y="56" font-size="12.5" fill="#5b5850">Claude Code, Cursor, any MCP client</text>
    <text x="20" y="78" font-size="12.5" font-weight="600" fill="#175cd3">pull tasks · push status (MCP)</text>
  </g>
  <text x="797" y="167" font-size="11" font-weight="600" fill="#2a7d5f" text-anchor="middle">keys</text>
  <text x="805" y="292" font-size="11" font-weight="600" fill="#175cd3" text-anchor="middle">MCP</text>

  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0 0 L8 4.5 L0 9 z" fill="#2a7d5f"/></marker>
    <marker id="arb" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0 0 L8 4.5 L0 9 z" fill="#175cd3"/></marker>
  </defs>

  <!-- integrations footer -->
  <g transform="translate(48,470)" font-size="12.5" fill="#5b5850">
    <text x="0" y="0">Connectors over MCP: Jira · Confluence · Slack — build once, your credentials, nothing brokered through us.</text>
  </g>
</svg>

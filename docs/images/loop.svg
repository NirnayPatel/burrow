<svg width="1200" height="280" viewBox="0 0 1200 280" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <rect width="1200" height="280" rx="20" fill="#faf9f7"/>
  <text x="48" y="52" font-size="20" font-weight="700" fill="#1c1b17" letter-spacing="-0.4">The loop</text>
  <text x="160" y="52" font-size="14" fill="#6f6b61">one place, from idea to shipped — humans and agents in the same workspace</text>

  <!-- 4 stages -->
  <g>
    <!-- arrows -->
    <path d="M306 158 h54" stroke="#cfcabd" stroke-width="2" fill="none" marker-end="url(#a)"/>
    <path d="M598 158 h54" stroke="#cfcabd" stroke-width="2" fill="none" marker-end="url(#a)"/>
    <path d="M890 158 h54" stroke="#cfcabd" stroke-width="2" fill="none" marker-end="url(#a)"/>
    <defs>
      <marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto">
        <path d="M0 0 L8 4.5 L0 9 z" fill="#cfcabd"/>
      </marker>
    </defs>

    <!-- stage 1 -->
    <g transform="translate(48,96)">
      <rect width="258" height="124" rx="14" fill="#ffffff" stroke="#e7e4de" stroke-width="1.5"/>
      <circle cx="34" cy="36" r="18" fill="#e7f2ec"/>
      <g transform="translate(34,36)" stroke="#2a7d5f" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="-7" y="-9" width="14" height="18" rx="2"/>
        <line x1="-3.5" y1="-3.5" x2="3.5" y2="-3.5"/>
        <line x1="-3.5" y1="0.5" x2="3.5" y2="0.5"/>
        <line x1="-3.5" y1="4.5" x2="1" y2="4.5"/>
      </g>
      <text x="64" y="33" font-size="12" font-weight="600" letter-spacing="0.5" fill="#2a7d5f">01 · WRITE</text>
      <text x="64" y="55" font-size="16" font-weight="700" fill="#1c1b17">Specs, together</text>
      <text x="24" y="86" font-size="12.5" fill="#5b5850">Real-time multiplayer editor.</text>
      <text x="24" y="105" font-size="12.5" fill="#5b5850">Live cursors, one source of truth.</text>
    </g>

    <!-- stage 2 -->
    <g transform="translate(340,96)">
      <rect width="258" height="124" rx="14" fill="#ffffff" stroke="#e7e4de" stroke-width="1.5"/>
      <circle cx="34" cy="36" r="18" fill="#e7f2ec"/>
      <path transform="translate(34,36)" d="M0,-9 L2.2,-2.2 L9,0 L2.2,2.2 L0,9 L-2.2,2.2 L-9,0 L-2.2,-2.2 Z" fill="#2a7d5f"/>
      <text x="64" y="33" font-size="12" font-weight="600" letter-spacing="0.5" fill="#2a7d5f">02 · BREAK DOWN</text>
      <text x="64" y="55" font-size="16" font-weight="700" fill="#1c1b17">AI, your keys</text>
      <text x="24" y="86" font-size="12.5" fill="#5b5850">Specs become agent-ready</text>
      <text x="24" y="105" font-size="12.5" fill="#5b5850">tasks with acceptance criteria.</text>
    </g>

    <!-- stage 3 -->
    <g transform="translate(632,96)">
      <rect width="258" height="124" rx="14" fill="#ffffff" stroke="#e7e4de" stroke-width="1.5"/>
      <rect x="18" y="20" width="34" height="34" rx="7" fill="#1f1e1a"/>
      <text x="35" y="42" font-size="13" font-weight="700" fill="#57b98c" text-anchor="middle">CC</text>
      <text x="64" y="33" font-size="12" font-weight="600" letter-spacing="0.5" fill="#2a7d5f">03 · SHIP</text>
      <text x="64" y="55" font-size="16" font-weight="700" fill="#1c1b17">Agents, over MCP</text>
      <text x="24" y="86" font-size="12.5" fill="#5b5850">Any coding agent pulls tasks</text>
      <text x="24" y="105" font-size="12.5" fill="#5b5850">and pushes status back.</text>
    </g>

    <!-- stage 4 -->
    <g transform="translate(924,96)">
      <rect width="228" height="124" rx="14" fill="#ffffff" stroke="#e7e4de" stroke-width="1.5"/>
      <circle cx="34" cy="36" r="18" fill="#e7f2ec"/>
      <path transform="translate(34,36)" d="M-6,0 L-2,5 L7,-6" stroke="#2a7d5f" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="64" y="33" font-size="12" font-weight="600" letter-spacing="0.5" fill="#2a7d5f">04 · APPROVE</text>
      <text x="64" y="55" font-size="16" font-weight="700" fill="#1c1b17">Sign-offs</text>
      <text x="24" y="86" font-size="12.5" fill="#5b5850">Append-only verdicts and a</text>
      <text x="24" y="105" font-size="12.5" fill="#5b5850">tamper-evident timeline.</text>
    </g>
  </g>
</svg>
